<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Halal Bihalal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">

        <section id="cover" class="page bg-1">
            <button id="btnBuka">Buka Undangan</button>
        </section>

        <div id="main-content" class="hidden">
            
            <section class="page bg-2"></section>

            <section class="page bg-3">
                <div class="timer-container" id="timer">
                    </div>
            </section>

            <section class="page bg-4">
                <div class="maps-container">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1980.528221804473!2d107.5925345!3d-6.8624143!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e68e6b943c2c5ff%3A0x8f2d5917d23d8c11!2sAuditorium%20FPMIPA%20UPI!5e0!3m2!1sid!2sid!4v1700000000000!5m2!1sid!2sid" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </section>

            <section class="page bg-5">
                <form id="formRSVP" class="rsvp-container">
                    <div class="form-group">
                        <label for="nama">Nama Lengkap:</label>
                        <input type="text" id="nama" name="nama" required placeholder="Masukkan nama Anda">
                    </div>

                    <div class="form-group">
                        <label for="status">Status:</label>
                        <select id="status" name="status" required>
                            <option value="" disabled selected>Pilih Status...</option>
                            <option value="Dosen Aktif">Dosen Aktif</option>
                            <option value="Pensiunan">Pensiunan</option>
                        </select>
                    </div>

                    <div id="sectionJabatan" class="form-group hidden-element">
                        <label for="jabatan">Jabatan Akademik:</label>
                        <select id="jabatan" name="jabatan">
                            <option value="" disabled selected>Pilih Jabatan...</option>
                            <option value="Professor">Professor</option>
                            <option value="LK">Lektor Kepala (LK)</option>
                            <option value="Lektor">Lektor</option>
                            <option value="AA">Asisten Ahli (AA)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="jumlah">Jumlah Kehadiran:</label>
                        <select id="jumlah" name="jumlah">
                            <option value="1">1 Orang</option>
                            <option value="2">2 Orang</option>
                            <option value="3">3 Orang</option>
                        </select>
                    </div>

                    <div id="sectionJumlahPasti" class="form-group hidden-element">
                        <label for="jumlahPasti">Jumlah Pasti Peserta:</label>
                        <input type="number" id="jumlahPasti" min="6" value="6">
                    </div>

                    <input type="text" name="honeypot" id="honeypot" tabindex="-1" autocomplete="off" style="display: none;">

                    <div id="infoIuran" class="info-iuran hidden-element">
                        </div>
                    
                    <input type="hidden" name="total" id="totalInput">
                    
                    <button type="submit" id="btnKirim">Kirim Konfirmasi</button>
                </form>
            </section>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
